name: CI

# Note: the project targets Windows (NTFS / Net API calls). Linux/macOS runners
# would fail to compile several crates (windows-sys, windows NetAPI). We run on
# windows-latest, matching the release pipeline.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Shorter compile time for CI; local builds keep the default.
  CARGO_INCREMENTAL: 0

permissions:
  contents: read

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy -D warnings
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test --workspace
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
      # AD integration tests are marked #[ignore] and require a running DC
      # with DEVMS_TEST_LDAP_* set. CI only runs the regular tests — they
      # do not need network or the TESTDOMAIN VM.
      - run: cargo test --workspace

  conformance:
    # Windows authorization conformance: runs the #[ignore]-by-default
    # harness that compares the engine's effective mask against the OS
    # APIs (GetEffectiveRightsFromAclW for single-trustee, AccessCheck for
    # token-based multi-group). It needs a real Windows session/token,
    # which the windows-latest runner provides, so it runs on every push —
    # making "conformance-verified for this commit" an honest claim rather
    # than something only ever checked locally (engine review 2026-06-13
    # finding 5). The AD/LSA/local-group #[ignore] tests still require a DC
    # and are NOT run here.
    name: windows authorization conformance
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-conformance-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-conformance-
      - run: cargo test -p permission_engine --test windows_conformance -- --ignored

  language:
    name: language check (US English only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      # Detector regression checks first (compound/phrase misses must flag,
      # clean English must pass), then the repository scan.
      - run: python scripts/check-language.py --selftest
      - run: python scripts/check-language.py --list
