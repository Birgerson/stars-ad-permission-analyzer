name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-windows:
    name: Build and Package (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build release binary
        run: cargo build --release --bin adpa-gui

      - name: Prepare installer assets
        run: |
          New-Item -ItemType Directory -Force installer-build
          Copy-Item target\release\adpa-gui.exe installer-build\Stars.exe
          Copy-Item installer\setup.nsi installer-build\setup.nsi

      - name: Locate or install NSIS
        run: |
          $nsis = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $nsis)) {
            Write-Host "NSIS not found, installing via Chocolatey..."
            choco install nsis --yes --no-progress
          }
          Write-Host "NSIS found at $nsis"

      - name: Build NSIS installer
        run: |
          $nsis = "C:\Program Files (x86)\NSIS\makensis.exe"
          # Derive the version from the tag: v0.2.0-rc15 -> 0.2.0-rc15.
          # Passed to makensis via /DAPP_VERSION so the "Programs and
          # Features" entry shows the real release version instead of a
          # hardcoded value.
          $appVersion = "${{ github.ref_name }}".TrimStart('v')
          Set-Location installer-build
          & $nsis "/DAPP_VERSION=$appVersion" setup.nsi
          if ($LASTEXITCODE -ne 0) { throw "makensis failed with exit code $LASTEXITCODE" }

      - name: Stage release artifact
        run: |
          $tag = "${{ github.ref_name }}"
          Move-Item installer-build\Stars-Setup.exe "Stars-${tag}-Setup.exe"

      - name: Compute SHA256 checksum
        id: sha
        # Stars currently has no code-signing certificate — the installer
        # triggers SmartScreen "Unknown publisher". To let users at least
        # verify file integrity we drop a SHA256 hash next to the binary
        # as `<exe>.sha256`. Format is sha256sum-compatible:
        # "<hash>  <filename>".
        run: |
          $tag = "${{ github.ref_name }}"
          $exe = "Stars-${tag}-Setup.exe"
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash.ToLower()
          # Double space is the sha256sum(1) format.
          "$hash  $exe" | Out-File -FilePath "$exe.sha256" -Encoding ascii -NoNewline
          # Expose the hash so the release body can embed it in the
          # antivirus false-positive note below (so every release carries
          # the proof-of-integrity hash automatically, not just by hand).
          "hash=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding ascii -Append
          Write-Host "Computed: $hash"
          Write-Host "Wrote: $exe.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Stars ${{ github.ref_name }}"
          # Tags containing '-' (e.g. v0.2.0-rc1, v1.0.0-beta) are marked as pre-release.
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## Stars — AD Permission Analyzer ${{ github.ref_name }}

            > ⚠️ **Antivirus false positive — this is expected and harmless.**
            > Because this installer is **not yet code-signed**, Microsoft Defender may flag it as `Trojan:Win32/Wacatac.C!ml`. The `!ml` suffix means it was flagged by a **machine-learning heuristic**, not matched against known malware — `Wacatac` is Defender's generic catch-all and the most common false positive for new, unsigned binaries doing AD/SMB enumeration.
            >
            > **You can prove the file is clean:** its SHA256 must equal
            > `${{ steps.sha.outputs.hash }}`
            > (also published in `Stars-${{ github.ref_name }}-Setup.exe.sha256` below). A matching hash means the file is bit-for-bit the build GitHub Actions produced from the public source — nothing could have been injected. Allow it in Defender (Protection history → Allow) and optionally report the false positive at https://www.microsoft.com/en-us/wdsi/filesubmission. The permanent fix is code signing (planned).

            ### Installation
            1. Download **Stars-${{ github.ref_name }}-Setup.exe** below.
            2. **Recommended:** also download the `.sha256` file and verify integrity (see below).
            3. Double-click the installer — no administrator rights required.
            4. A **Stars** icon appears on the desktop.

            ### Verify integrity (SHA256)

            Stars currently has **no code-signing certificate** — Windows SmartScreen warns
            accordingly ("unknown publisher"). To check that the downloaded file is identical
            to the build published on GitHub:

            **PowerShell:**
            ```powershell
            $exe = "Stars-${{ github.ref_name }}-Setup.exe"
            $expected = (Get-Content "$exe.sha256").Split("  ")[0]
            $actual = (Get-FileHash $exe -Algorithm SHA256).Hash.ToLower()
            if ($actual -eq $expected) { "OK — file matches" } else { "MISMATCH — DO NOT use" }
            ```

            **bash / WSL / macOS:**
            ```bash
            sha256sum -c Stars-${{ github.ref_name }}-Setup.exe.sha256
            ```

            If the script prints `OK` or `Stars-…-Setup.exe: OK`, the file is bit-for-bit the
            build this GitHub Actions run produced — no man-in-the-middle, no tampered copy.
            This does **not** replace code signing (you verify the authenticity of the source
            via the GitHub repo itself), but it protects against tampered downloads.

            ### System requirements
            - Windows 10 / Windows 11 / Windows Server 2016 or newer
            - No additional software required (self-contained EXE)

            ### Features
            - NTFS ACL analysis with the full permission path
            - Recursive tree scan with a live result table
            - Risk analysis (6 rules: Full Control, Write Access, Admin Rights, Broad Group, Direct User ACE, Sensitive Path)
            - HTML / JSON / CSV report export
            - Delta comparison between two scan runs
            - Optional LDAP / Active Directory identity resolution
            - Optional SMB share permission overlay
            - SQLite scan history per user profile
          files: |
            Stars-${{ github.ref_name }}-Setup.exe
            Stars-${{ github.ref_name }}-Setup.exe.sha256
          generate_release_notes: false
