name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-windows:
    name: Build and Package (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build release binary
        run: cargo build --release --bin adpa-gui

      - name: Prepare installer assets
        run: |
          New-Item -ItemType Directory -Force installer-build
          Copy-Item target\release\adpa-gui.exe installer-build\Stars.exe
          Copy-Item installer\setup.nsi installer-build\setup.nsi

      - name: Locate or install NSIS
        run: |
          $nsis = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $nsis)) {
            Write-Host "NSIS not found, installing via Chocolatey..."
            choco install nsis --yes --no-progress
          }
          Write-Host "NSIS found at $nsis"

      - name: Build NSIS installer
        run: |
          $nsis = "C:\Program Files (x86)\NSIS\makensis.exe"
          # Version aus dem Tag ableiten: v0.2.0-rc15 -> 0.2.0-rc15.
          # Wird per /DAPP_VERSION an makensis uebergeben, damit der
          # Eintrag in "Programme und Features" die echte Release-Version
          # zeigt statt des Hardcoded-Werts.
          # Derive the version from the tag: v0.2.0-rc15 -> 0.2.0-rc15.
          # Passed to makensis via /DAPP_VERSION so the "Programs and
          # Features" entry shows the real release version instead of a
          # hardcoded value.
          $appVersion = "${{ github.ref_name }}".TrimStart('v')
          Set-Location installer-build
          & $nsis "/DAPP_VERSION=$appVersion" setup.nsi
          if ($LASTEXITCODE -ne 0) { throw "makensis failed with exit code $LASTEXITCODE" }

      - name: Stage release artifact
        run: |
          $tag = "${{ github.ref_name }}"
          Move-Item installer-build\Stars-Setup.exe "Stars-${tag}-Setup.exe"

      - name: Compute SHA256 checksum
        # Stars hat (Stand jetzt) kein Code-Signing-Zertifikat —
        # der Installer triggert SmartScreen "Unknown publisher". Damit
        # Anwender die Datei wenigstens auf Integritaet pruefen koennen,
        # legen wir einen SHA256-Hash als `<exe>.sha256` daneben. Format
        # ist sha256sum-kompatibel: "<hash>  <dateiname>".
        # Stars currently has no code-signing certificate — the installer
        # triggers SmartScreen "Unknown publisher". To let users at least
        # verify file integrity we drop a SHA256 hash next to the binary
        # as `<exe>.sha256`. Format is sha256sum-compatible:
        # "<hash>  <filename>".
        run: |
          $tag = "${{ github.ref_name }}"
          $exe = "Stars-${tag}-Setup.exe"
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash.ToLower()
          # Doppel-Leerzeichen ist das sha256sum(1)-Format.
          # Double space is the sha256sum(1) format.
          "$hash  $exe" | Out-File -FilePath "$exe.sha256" -Encoding ascii -NoNewline
          Write-Host "Computed: $hash"
          Write-Host "Wrote: $exe.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Stars ${{ github.ref_name }}"
          # Tags mit '-' (z. B. v0.2.0-rc1, v1.0.0-beta) als Pre-Release markieren.
          # Tags containing '-' (e.g. v0.2.0-rc1, v1.0.0-beta) are marked as pre-release.
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## Stars — AD Permission Analyzer ${{ github.ref_name }}

            ### Installation
            1. Download **Stars-${{ github.ref_name }}-Setup.exe** below.
            2. **Empfohlen:** zusätzlich `.sha256`-Datei laden und Integrität verifizieren (siehe unten).
            3. Doppelklick auf den Installer — keine Administratorrechte erforderlich.
            4. Ein **Stars**-Symbol erscheint auf dem Desktop.

            ### Integrität verifizieren (SHA256)

            Stars hat aktuell **kein Code-Signing-Zertifikat** — Windows SmartScreen warnt
            entsprechend („unbekannter Herausgeber"). Damit du trotzdem prüfen kannst, dass
            die heruntergeladene Datei mit dem auf GitHub freigegebenen Build identisch ist:

            **PowerShell:**
            ```powershell
            $exe = "Stars-${{ github.ref_name }}-Setup.exe"
            $expected = (Get-Content "$exe.sha256").Split("  ")[0]
            $actual = (Get-FileHash $exe -Algorithm SHA256).Hash.ToLower()
            if ($actual -eq $expected) { "OK — Datei stimmt" } else { "MISMATCH — NICHT verwenden" }
            ```

            **bash / WSL / macOS:**
            ```bash
            sha256sum -c Stars-${{ github.ref_name }}-Setup.exe.sha256
            ```

            Gibt das Skript `OK` bzw. `Stars-…-Setup.exe: OK` aus, ist die Datei bit-genau
            der Build, den dieser GitHub-Actions-Lauf erzeugt hat — kein Man-in-the-Middle,
            keine veränderte Kopie. Das ersetzt **kein** Code-Signing (die Echtheit der Quelle
            verifizierst du über das GitHub-Repo selbst), schützt aber gegen verfälschte
            Downloads.

            ### Systemvoraussetzungen
            - Windows 10 / Windows 11 / Windows Server 2016 oder neuer
            - Keine zusätzliche Software erforderlich (eigenständige EXE)

            ### Features
            - NTFS-ACL-Analyse mit vollständigem Berechtigungspfad
            - Rekursiver Baum-Scan mit Live-Ergebnistabelle
            - Risikoanalyse (6 Regeln: Full Control, Write Access, Admin Rights, Broad Group, Direct User ACE, Sensitive Path)
            - HTML-/JSON-/CSV-Berichtsexport
            - Delta-Vergleich zwischen zwei Scan-Läufen
            - Optionale LDAP / Active Directory Identitätsauflösung
            - Optionale SMB-Share-Berechtigungsüberlagerung
            - SQLite-Scan-Historie pro Benutzerprofil
          files: |
            Stars-${{ github.ref_name }}-Setup.exe
            Stars-${{ github.ref_name }}-Setup.exe.sha256
          generate_release_notes: false
